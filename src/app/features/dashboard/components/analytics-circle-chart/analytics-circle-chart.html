<div class="chart-card">
  <h3 class="chart-title">{{ title() }}</h3>
  <div class="chart-wrapper">
    <ngx-charts-pie-chart
      [results]="chartData()"
      [scheme]="colorScheme"
      [legend]="true"
      [legendPosition]="legendPosition"
      [doughnut]="true"
      [arcWidth]="0.25"
      [animations]="true"
      [labels]="false"
    >
    </ngx-charts-pie-chart>
  </div>
</div>
