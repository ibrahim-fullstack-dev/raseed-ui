<div class="topbar-container">
  <!-- الجانب الأيمن: حقل البحث -->
  <div class="right-section">
    @if (showSearch()) {
      <div class="search-wrapper">
        <i class="search-icon">🔍</i>
        <input
          type="text"
          [placeholder]="searchPlaceholder()"
          [ngModel]="searchTerm()"
          (ngModelChange)="onSearch($event)"
          class="form-control search-input"
        />
      </div>
    }
  </div>

  <!-- الجانب الأيسر: أزرار التحكم الديناميكية بالكامل -->
  <div class="left-section">
    @if (showFilter()) {
      <button
        [className]="'btn btn-' + (filterConfig().variant || 'secondary')"
        [title]="filterConfig().title || ''"
        (click)="filterClick.emit()"
      >
        @if (filterConfig().icon) {
          <span class="icon">{{ filterConfig().icon }}</span>
        }
        {{ filterConfig().label }}
      </button>
    }

    @if (showExport()) {
      <button
        [className]="'btn btn-' + (exportConfig().variant || 'secondary')"
        [title]="exportConfig().title || ''"
        (click)="exportClick.emit()"
      >
        @if (exportConfig().icon) {
          <span class="icon">{{ exportConfig().icon }}</span>
        }
        {{ exportConfig().label }}
      </button>
    }

    @if (showDelete()) {
      <button
        [className]="'btn btn-' + (deleteConfig().variant || 'danger')"
        [title]="deleteConfig().title || ''"
        (click)="deleteClick.emit()"
      >
        @if (deleteConfig().icon) {
          <span class="icon">{{ deleteConfig().icon }}</span>
        }
        {{ deleteConfig().label }}
      </button>
    }

    @if (showAdd()) {
      <button
        [className]="'btn btn-' + (addConfig().variant || 'primary')"
        [title]="addConfig().title || ''"
        (click)="addClick.emit()"
      >
        @if (addConfig().icon) {
          <span class="icon">{{ addConfig().icon }}</span>
        }
        {{ addConfig().label }}
      </button>
    }
  </div>
</div>
