<div class="input-wrapper" [class.input-disabled]="disabled()" [class.input-has-error]="error()">
  @if (label()) {
    <label [attr.for]="inputId" class="input-label">
      {{ label() }}
      @if (required()) {
        <span class="required-asterisk" aria-hidden="true">*</span>
      }
    </label>
  }

  <input
    [id]="inputId"
    [type]="type()"
    [placeholder]="placeholder()"
    [disabled]="disabled()"
    [value]="value"
    [attr.aria-invalid]="error() ? 'true' : 'false'"
    [attr.aria-describedby]="error() ? inputId + '-error' : null"
    (input)="onInputChange($event)"
    (blur)="onInputBlur()"
    class="form-input"
  />

  @if (error()) {
    <span [id]="inputId + '-error'" class="input-error-message" role="alert">
      {{ error() }}
    </span>
  }
</div>
